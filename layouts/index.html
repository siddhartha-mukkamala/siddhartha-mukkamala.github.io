{{ define "main" }}
  <h1>{{ .Site.Title }}</h1>
  <p>Welcome to my blog.</p>

  <h2>Recent Posts</h2>
  <ul class="post-list">
    {{ range first 10 (where .Site.RegularPages "Section" "posts") }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a><br>
        <span class="meta">{{ .Date.Format "January 2, 2006" }}</span>
      </li>
    {{ end }}
  </ul>
{{ end }}
