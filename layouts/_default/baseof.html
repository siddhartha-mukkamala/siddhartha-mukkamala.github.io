<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #222;
    }
    nav {
      margin-bottom: 30px;
    }
    nav a {
      margin-right: 16px;
      text-decoration: none;
      color: #0366d6;
    }
    h1, h2, h3 {
      line-height: 1.25;
    }
    .post-list li {
      margin-bottom: 10px;
    }
    .meta {
      color: #666;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/posts/">Posts</a>
  </nav>

  {{ block "main" . }}{{ end }}
</body>
</html>
